version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: automate_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-automate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sh_secret}
      POSTGRES_DB: ${POSTGRES_DB:-automate_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - automate_net

  worker:
    build: .
    container_name: automate_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://automate:sh_secret@postgres:5432/automate_db}
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      - postgres
    networks:
      - automate_net

networks:
  automate_net:
volumes:
  postgres_data:
