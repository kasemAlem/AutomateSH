# Workflow name and trigger events
name: Go CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Environment variables for Go
env:
  GO_VERSION: '1.21'
  GOPROXY: 'https://proxy.golang.org,direct'

jobs:
  # Linting and testing job
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Go environment with caching
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Cache golangci-lint binary for faster subsequent runs
      - name: Cache golangci-lint
        uses: actions/cache@v3
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-

      # Install golangci-lint
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
          golangci-lint --version

      # Download Go module dependencies
      - name: Download dependencies
        run: go mod download

      # Run golangci-lint with verbose output
      - name: Run golangci-lint
        run: golangci-lint run ./... --timeout=5m --verbose

      # Run tests with race detector enabled
      - name: Run tests with race detector
        run: go test -race -v -count=1 ./...

      # Optional: Run tests with coverage report
      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic -v -count=1 ./...

      # Upload coverage report as artifact (optional)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7