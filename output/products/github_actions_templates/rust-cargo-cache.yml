# Rust CI pipeline with aggressive Cargo caching
# This workflow runs on pushes to main and all pull requests
name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation to avoid cache poisoning
  CARGO_INCREMENTAL: 0
  # Enable build cache for faster builds
  RUSTC_WRAPPER: ""
  # Set the cache key prefix for cache invalidation
  CARGO_CACHE_KEY_PREFIX: "v1"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Restore Cargo registry and build cache
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        id: cargo-cache
        with:
          # Cache both the registry index and compiled artifacts
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target/
          # Generate a comprehensive cache key based on:
          # - OS (ubuntu-latest)
          # - Rust toolchain version
          # - Cargo.lock file hash
          # - Cache key prefix for manual invalidation
          key: ${{ runner.os }}-cargo-${{ env.CARGO_CACHE_KEY_PREFIX }}-${{ hashFiles('**/Cargo.lock') }}
          # Fallback to the most recent cache if the exact key doesn't match
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.CARGO_CACHE_KEY_PREFIX }}-
            ${{ runner.os }}-cargo-
      
      # Install Rust toolchain with minimal profile for faster setup
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt
      
      # Check formatting
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      # Run clippy lints
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      # Build all targets to ensure compilation succeeds
      - name: Build
        run: cargo build --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    # Run tests only after check passes to save resources
    needs: check
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Restore cache with same strategy as check job
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target/
          key: ${{ runner.os }}-cargo-${{ env.CARGO_CACHE_KEY_PREFIX }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.CARGO_CACHE_KEY_PREFIX }}-
            ${{ runner.os }}-cargo-
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      # Run all tests including doc tests
      - name: Run tests
        run: cargo test --all-targets --all-features
      
      # Run documentation tests separately
      - name: Run doc tests
        run: cargo test --doc --all-features

  # Optional: Run on different OS for cross-platform compatibility
  test-cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false  # Continue testing other OS even if one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target/
          key: ${{ matrix.os }}-cargo-${{ env.CARGO_CACHE_KEY_PREFIX }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-${{ env.CARGO_CACHE_KEY_PREFIX }}-
            ${{ matrix.os }}-cargo-
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      - name: Build
        run: cargo build --all-targets --all-features
      
      - name: Run tests
        run: cargo test --all-targets --all-features