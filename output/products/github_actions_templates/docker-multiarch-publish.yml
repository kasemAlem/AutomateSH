# Name of the workflow
name: Build and Push Multi-Arch Docker Images

# Trigger the workflow on pushes to main branch and on pull requests
on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ main, master ]

# Environment variables that can be customized
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/your-image-name  # Replace with your image name

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Set permissions for the GITHUB_TOKEN
    permissions:
      contents: read
      packages: write
    
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up QEMU for multi-architecture builds
      # This enables emulation for different CPU architectures
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Step 3: Set up Docker Buildx with multi-architecture support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the latest buildx version with full multi-platform support
          version: latest
          # Enable driver options for better performance
          driver-opts: |
            image=moby/buildkit:latest

      # Step 4: Log in to Docker Hub (only for push events)
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # Step 5: Extract metadata for Docker labels and tags
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Generate tags based on git references
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            # Always generate 'latest' tag for default branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}

      # Step 6: Build and push multi-architecture Docker images
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          # Path to the Dockerfile (defaults to ./Dockerfile)
          context: .
          file: ./Dockerfile
          
          # Build for both amd64 and arm64 architectures
          platforms: linux/amd64,linux/arm64
          
          # Push to registry only for non-PR events
          push: ${{ github.event_name != 'pull_request' }}
          
          # Use the tags and labels from metadata step
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
          # Cache management for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
          # Build arguments if needed
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}

      # Step 7: Verify the pushed images (optional, for push events only)
      - name: Verify multi-arch manifest
        if: github.event_name != 'pull_request'
        run: |
          echo "Verifying multi-architecture images..."
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}